<!DOCTYPE html>
<html>
<head>
  <title>Email Access Checker</title>
  <script src="https://apis.google.com/js/api.js">
  // Replace with your own values
	const SHEET_ID = "1i8w-_jRwhOmjNxflLmqN80m8tPwDFUcJ2dON9yyywkQ"; // Google Sheet ID
	const RANGE = "Sheet1!A:Z";        // Adjust range based on your sheet

	function initClient() {
	gapi.client.init({
		apiKey: "AIzaSyCvTLuCmTsDTN4yKXDcYqlnoDu_bjWfr9A",
		clientId: "160729259266-ed2isrqtng3799re2p9vpah3rosar6e3.apps.googleusercontent.com",
		discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
		scope: "https://www.googleapis.com/auth/spreadsheets.readonly"
	}).then(() => gapi.auth2.getAuthInstance().signIn());
	}
	gapi.load("client:auth2", initClient);
	
	async function checkEmail() {
	const email = document.getElementById("emailInput").value.trim();
	if (!email) {
		alert("Please enter an email");
		return;
	}
	
	try {
		const response = await gapi.client.sheets.spreadsheets.values.get({
		spreadsheetId: SHEET_ID,
		range: RANGE
		});
	
		const rows = response.result.values;
		if (!rows || rows.length === 0) {
		document.getElementById("result").innerText = "No data found.";
		return;
		}
	
		const headers = rows[0]; // first row = folder names
		let foundFolders = [];
	
		// check each column for the email
		for (let col = 0; col < headers.length; col++) {
		for (let row = 1; row < rows.length; row++) {
			if (rows[row][col] && rows[row][col].toLowerCase() === email.toLowerCase()) {
			foundFolders.push(headers[col]);
			}
		}
		}
	
		if (foundFolders.length > 0) {
		document.getElementById("result").innerText =
			`${email} has access to: ${foundFolders.join(", ")}`;
		} else {
		document.getElementById("result").innerText =
			`${email} not found in spreadsheet.`;
		}
	} catch (err) {
		console.error("Error:", err);
		document.getElementById("result").innerText = "Error fetching data.";
	}
	}
  </script>
</head>
<body>
  <h2>Check Folder Access</h2>
  <input type="text" id="emailInput" placeholder="Enter email">
  <button onclick="checkEmail()">Check Access</button>
  <div id="result"></div>
</body>
</html>
